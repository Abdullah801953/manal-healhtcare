services:
  web:
    image: abdullahdkc/manal-healthcare-docker:latest
    container_name: manal-healthcare
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      MONGODB_URI: ${MONGODB_URI}
      NEXT_PUBLIC_BASE_URL: https://manalhealthcare.com
      JWT_SECRET: ${JWT_SECRET}
      UPLOAD_DIR: /app/public/uploads
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      INQUIRY_RECIPIENT_EMAIL: ${INQUIRY_RECIPIENT_EMAIL}
      INQUIRY_CC_EMAIL: ${INQUIRY_CC_EMAIL}
    volumes:
      - ./uploads:/app/public/uploads
    labels:
      - com.centurylinklabs.watchtower.enable=true
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 768M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  watchtower:
    image: containrrr/watchtower:latest
    container_name: manal-healthcare-watchtower
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.44
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup --label-enable