services:
  web:
    image: abdullahdkc/manal-healthcare-docker:latest
    container_name: manal-healthcare
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: ${MONGODB_URI}
      NEXT_PUBLIC_BASE_URL: https://manalhealthcare.com
      JWT_SECRET: ${JWT_SECRET}
      UPLOAD_DIR: /app/public/uploads
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      INQUIRY_RECIPIENT_EMAIL: ${INQUIRY_RECIPIENT_EMAIL}
      INQUIRY_CC_EMAIL: ${INQUIRY_CC_EMAIL}
    volumes:
      - ./uploads:/app/public/uploads
    labels:
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  watchtower:
    image: containrrr/watchtower:latest
    container_name: manal-healthcare-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup --label-enable