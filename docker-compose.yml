services:
  web:
    image: abdullahdkc/manal-healthcare-docker:latest
    container_name: manal-healthcare
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=${MONGODB_URI}
      - NEXT_PUBLIC_BASE_URL=https://manalhealthcare.com
      - JWT_SECRET=${JWT_SECRET}
      - UPLOAD_DIR=/app/public/uploads
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - INQUIRY_RECIPIENT_EMAIL=${INQUIRY_RECIPIENT_EMAIL}
      - INQUIRY_CC_EMAIL=${INQUIRY_CC_EMAIL}
    volumes:
      - ./uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
